# =============================================================================
# Nexus Agents — Docker Compose Unificado
# =============================================================================
# Contiene los 5 agentes CLI de Xtreme Diagnostics:
#   - DeepSeek TUI / CodeWhale  (puerto 7681)
#   - Gemini CLI                (puerto 7682)
#   - Antigravity CLI           (puerto 7683)
#   - Minimax CLI               (puerto 7684)
#   - Codex CLI                 (puerto 7685)
#
# Workspace compartido: ${WORKSPACE_PATH:-/workspace}
# Límite RAM total: ~500 MB entre todos los agentes
# Guardian: monitorea y limpia sesiones viejas automáticamente
# =============================================================================

services:

  # -------------------------------------------------------------------
  # DeepSeek TUI / CodeWhale — web TUI + tmux + cloudflared tunnel
  # URL: https://deepseek.xtremediagnostics.com
  # -------------------------------------------------------------------
  deepseek:
    image: nexus-deepseek:v6
    container_name: nexus-deepseek
    network_mode: host
    mem_limit: 150m
    mem_reservation: 80m
    environment:
      - LANG=C.utf8
      - LC_ALL=C.utf8
      - TZ=${TZ:-America/Monterrey}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        export LANG=C.utf8 LC_ALL=C.utf8

        # Alias codewhale → deepseek
        ln -sf /usr/bin/codewhale /usr/local/bin/deepseek 2>/dev/null || true
        deepseek --version 2>&1 || true

        # Configurar tmux
        mkdir -p /root/.tmux /tmp/www
        cat > /root/.tmux.conf << 'TMUXCONF'
        set -g mouse on
        set -g set-clipboard on
        set -g utf8 on
        TMUXCONF

        # Landing page HTML
        cat > /tmp/www/index.html << 'HTMLEOF'
        <!DOCTYPE html>
        <html lang="es">
        <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,user-scalable=yes">
        <title>Nexus DeepSeek</title>
        <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;background:#000;overflow:hidden}
        html{zoom:150%}
        #term-wrap{width:100%;height:100%}
        #term-wrap iframe{width:100%;height:100%;border:none}
        </style>
        </head>
        <body>
        <div id="term-wrap"><iframe src="http://127.0.0.1:7681"></iframe></div>
        </body>
        </html>
        HTMLEOF

        # Servidor estático
        cd /tmp/www && python3 -m http.server 7680 --bind 127.0.0.1 &

        sleep 2

        # Tmux session con deepseek
        tmux has-session -t deepseek 2>/dev/null || tmux new-session -d -s deepseek deepseek

        exec ttyd --writable \
          -t "fontFamily=Menlo,Monaco,Droid Sans Mono,Roboto Mono,Noto Sans Mono,monospace" \
          -t "theme={\"background\":\"#000000\",\"foreground\":\"#00FF00\",\"cursor\":\"#00FF00\",\"selectionBackground\":\"#003300\",\"black\":\"#000000\",\"red\":\"#00AA00\",\"green\":\"#00FF00\",\"yellow\":\"#00DD00\",\"blue\":\"#00CC00\",\"magenta\":\"#00BB00\",\"cyan\":\"#00EE00\",\"white\":\"#00FF44\",\"brightBlack\":\"#004400\",\"brightRed\":\"#00FF00\",\"brightGreen\":\"#00FF33\",\"brightYellow\":\"#00FF00\",\"brightBlue\":\"#00FF22\",\"brightMagenta\":\"#00FF11\",\"brightCyan\":\"#00FF44\",\"brightWhite\":\"#00FF55\"}" \
          --port 7681 tmux -u attach-session -t deepseek
    volumes:
      - deepseek-config:/root/.deepseek
      - ollama-models:/root/.ollama
      - ${WORKSPACE_PATH:-/config/ERP-DOCKER-STACK}:/workspace:rw
    restart: unless-stopped

  # -------------------------------------------------------------------
  # Cloudflared tunnel para DeepSeek (config remota en Cloudflare)
  # -------------------------------------------------------------------
  tunnel-deepseek:
    image: cf-deepseek:v3
    container_name: cloudflared-deepseek
    network_mode: host
    mem_limit: 50m
    mem_reservation: 25m
    command: cloudflared tunnel --no-autoupdate run
    restart: unless-stopped
    depends_on:
      - deepseek

  # -------------------------------------------------------------------
  # Gemini CLI — Google Gemini AI via ttyd
  # URL: https://gemini.xtremediagnostics.com
  # -------------------------------------------------------------------
  gemini:
    image: nexus-gemini:v1
    container_name: nexus-gemini
    network_mode: host
    mem_limit: 150m
    mem_reservation: 80m
    environment:
      - LANG=C.utf8
      - LC_ALL=C.utf8
      - TERM=xterm-256color
      - TZ=${TZ:-America/Monterrey}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-YOUR_GEMINI_API_KEY_HERE}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        export LANG=C.utf8 LC_ALL=C.utf8

        # Instalar cloudflared si no está presente
        if ! command -v cloudflared &>/dev/null; then
          wget -qO /usr/local/bin/cloudflared \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x /usr/local/bin/cloudflared
        fi

        # Tunnel ID y credenciales
        TUNNEL_ID="164582bd-4953-4c29-b852-0612694c6529"
        mkdir -p /root/.cloudflared

        # Si existe el archivo de credenciales montado, usarlo; si no, crear desde variable
        if [ -f "/tunnel-creds.json" ]; then
          cp /tunnel-creds.json "/root/.cloudflared/${TUNNEL_ID}.json"
        else
          cat > "/root/.cloudflared/${TUNNEL_ID}.json" << CREDSEOF
        ${GEMINI_TUNNEL_CREDS:-{\"AccountTag\":\"c00f175ffd87599332aa9695fe52717f\",\"TunnelID\":\"164582bd-4953-4c29-b852-0612694c6529\",\"TunnelSecret\":\"\"\}}
        CREDSEOF
        fi
        chmod 600 "/root/.cloudflared/${TUNNEL_ID}.json"

        # Config cloudflared
        cat > /root/.cloudflared/config.yml << CFEOF
        tunnel: ${TUNNEL_ID}
        credentials-file: /root/.cloudflared/${TUNNEL_ID}.json
        ingress:
          - hostname: gemini.xtremediagnostics.com
            service: http://localhost:7682
          - service: http_status:404
        CFEOF

        # Iniciar cloudflared en background
        cloudflared tunnel --config /root/.cloudflared/config.yml run > /tmp/cf.log 2>&1 &

        # Iniciar gemini CLI via ttyd
        exec ttyd --writable \
          -t fontSize=22 \
          -t "fontFamily=Liberation Mono, Consolas, monospace" \
          -t cursorBlink=true \
          -t cursorStyle=block \
          -t screenReaderMode=true \
          --ping-interval 30 --max-clients 10 \
          --port 7682 gemini -y
    volumes:
      - gemini-config:/root/.gemini
      - ${WORKSPACE_PATH:-/config/ERP-DOCKER-STACK}:/workspace:rw
      - ${TUNNELS_DIR:-./tunnels}/gemini.json:/tunnel-creds.json:ro
    restart: unless-stopped

  # -------------------------------------------------------------------
  # Antigravity CLI — via ttyd
  # URL: https://antigravity.xtremediagnostics.com
  # -------------------------------------------------------------------
  antigravity:
    image: nexus-antigravity:v1
    container_name: nexus-antigravity
    network_mode: host
    mem_limit: 150m
    mem_reservation: 80m
    environment:
      - LANG=C.utf8
      - LC_ALL=C.utf8
      - TZ=${TZ:-America/Monterrey}
      - DEBIAN_FRONTEND=noninteractive
      - ANTIGRAVITY_API_KEY=${ANTIGRAVITY_API_KEY:-}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        export LANG=C.utf8 LC_ALL=C.utf8

        # Instalar cloudflared
        if ! command -v cloudflared &>/dev/null; then
          wget -qO /usr/local/bin/cloudflared \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x /usr/local/bin/cloudflared
        fi

        TUNNEL_ID="bfdfe5dd-f2e9-4cb4-b496-5aedf70cea41"
        mkdir -p /root/.cloudflared

        if [ -f "/tunnel-creds.json" ]; then
          cp /tunnel-creds.json "/root/.cloudflared/${TUNNEL_ID}.json"
        else
          cat > "/root/.cloudflared/${TUNNEL_ID}.json" << CREDSEOF
        ${ANTIGRAVITY_TUNNEL_CREDS:-{\"AccountTag\":\"c00f175ffd87599332aa9695fe52717f\",\"TunnelID\":\"bfdfe5dd-f2e9-4cb4-b496-5aedf70cea41\",\"TunnelSecret\":\"\"\}}
        CREDSEOF
        fi
        chmod 600 "/root/.cloudflared/${TUNNEL_ID}.json"

        cat > /root/.cloudflared/config.yml << CFEOF
        tunnel: ${TUNNEL_ID}
        credentials-file: /root/.cloudflared/${TUNNEL_ID}.json
        ingress:
          - hostname: antigravity.xtremediagnostics.com
            service: http://localhost:7683
          - service: http_status:404
        CFEOF

        cloudflared tunnel --config /root/.cloudflared/config.yml run > /tmp/cf.log 2>&1 &

        exec ttyd --writable \
          -t fontSize=22 \
          -t "fontFamily=Liberation Mono, Consolas, monospace" \
          -t cursorBlink=true \
          -t cursorStyle=block \
          -t screenReaderMode=true \
          --ping-interval 30 \
          --port 7683 agy
    volumes:
      - antigravity-config:/root/.antigravity
      - ${WORKSPACE_PATH:-/config/ERP-DOCKER-STACK}:/workspace:rw
      - ${TUNNELS_DIR:-./tunnels}/antigravity.json:/tunnel-creds.json:ro
    restart: unless-stopped

  # -------------------------------------------------------------------
  # Minimax CLI — via ttyd
  # URL: https://minimax.xtremediagnostics.com
  # -------------------------------------------------------------------
  minimax:
    image: nexus-minimax:v1
    container_name: nexus-minimax
    network_mode: host
    mem_limit: 100m
    mem_reservation: 50m
    environment:
      - LANG=C.utf8
      - LC_ALL=C.utf8
      - TERM=xterm-256color
      - TZ=${TZ:-America/Monterrey}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        export LANG=C.utf8 LC_ALL=C.utf8

        if ! command -v cloudflared &>/dev/null; then
          wget -qO /usr/local/bin/cloudflared \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x /usr/local/bin/cloudflared
        fi

        TUNNEL_ID="ff535b19-aeb2-4e74-8c2d-7e4c2c2fb27c"
        mkdir -p /root/.cloudflared

        if [ -f "/tunnel-creds.json" ]; then
          cp /tunnel-creds.json "/root/.cloudflared/${TUNNEL_ID}.json"
        else
          cat > "/root/.cloudflared/${TUNNEL_ID}.json" << CREDSEOF
        ${MINIMAX_TUNNEL_CREDS:-{\"AccountTag\":\"c00f175ffd87599332aa9695fe52717f\",\"TunnelID\":\"ff535b19-aeb2-4e74-8c2d-7e4c2c2fb27c\",\"TunnelSecret\":\"\"\}}
        CREDSEOF
        fi
        chmod 600 "/root/.cloudflared/${TUNNEL_ID}.json"

        cat > /root/.cloudflared/config.yml << CFEOF
        tunnel: ${TUNNEL_ID}
        credentials-file: /root/.cloudflared/${TUNNEL_ID}.json
        ingress:
          - hostname: minimax.xtremediagnostics.com
            service: http://localhost:7684
          - service: http_status:404
        CFEOF

        cloudflared tunnel --config /root/.cloudflared/config.yml run > /tmp/cf.log 2>&1 &

        exec ttyd --writable \
          -t fontSize=22 \
          -t "fontFamily=Liberation Mono, Consolas, monospace" \
          -t cursorBlink=true \
          -t cursorStyle=block \
          -t screenReaderMode=true \
          --ping-interval 30 --max-clients 10 \
          --port 7684 bash
    volumes:
      - minimax-config:/root/.minimax
      - ${WORKSPACE_PATH:-/config/ERP-DOCKER-STACK}:/workspace:rw
      - ${TUNNELS_DIR:-./tunnels}/minimax.json:/tunnel-creds.json:ro
    restart: unless-stopped

  # -------------------------------------------------------------------
  # Codex CLI — via ttyd
  # URL: https://codex.xtremediagnostics.com
  # -------------------------------------------------------------------
  codex:
    image: nexus-codex:v1
    container_name: nexus-codex
    network_mode: host
    mem_limit: 100m
    mem_reservation: 50m
    environment:
      - LANG=C.utf8
      - LC_ALL=C.utf8
      - TERM=xterm-256color
      - TZ=${TZ:-America/Monterrey}
      - CODEX_API_KEY=${CODEX_API_KEY:-}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        export LANG=C.utf8 LC_ALL=C.utf8

        if ! command -v cloudflared &>/dev/null; then
          wget -qO /usr/local/bin/cloudflared \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x /usr/local/bin/cloudflared
        fi

        TUNNEL_ID="7b806aad-031d-48b3-92f1-28cf0494fda8"
        mkdir -p /root/.cloudflared

        if [ -f "/tunnel-creds.json" ]; then
          cp /tunnel-creds.json "/root/.cloudflared/${TUNNEL_ID}.json"
        else
          cat > "/root/.cloudflared/${TUNNEL_ID}.json" << CREDSEOF
        ${CODEX_TUNNEL_CREDS:-{\"AccountTag\":\"c00f175ffd87599332aa9695fe52717f\",\"TunnelID\":\"7b806aad-031d-48b3-92f1-28cf0494fda8\",\"TunnelSecret\":\"\"\}}
        CREDSEOF
        fi
        chmod 600 "/root/.cloudflared/${TUNNEL_ID}.json"

        cat > /root/.cloudflared/config.yml << CFEOF
        tunnel: ${TUNNEL_ID}
        credentials-file: /root/.cloudflared/${TUNNEL_ID}.json
        ingress:
          - hostname: codex.xtremediagnostics.com
            service: http://localhost:7685
          - service: http_status:404
        CFEOF

        cloudflared tunnel --config /root/.cloudflared/config.yml run > /tmp/cf.log 2>&1 &

        exec ttyd --writable \
          -t fontSize=22 \
          -t "fontFamily=Liberation Mono, Consolas, monospace" \
          -t cursorBlink=true \
          -t cursorStyle=block \
          -t screenReaderMode=true \
          --ping-interval 30 --max-clients 10 \
          --port 7685 codex
    volumes:
      - codex-config:/root/.codex
      - ${WORKSPACE_PATH:-/config/ERP-DOCKER-STACK}:/workspace:rw
      - ${TUNNELS_DIR:-./tunnels}/codex.json:/tunnel-creds.json:ro
    restart: unless-stopped

  # -------------------------------------------------------------------
  # Nexus Monitor — API HTTP de recursos del servidor en tiempo real
  # -------------------------------------------------------------------
  monitor:
    image: nexus-monitor:v1
    container_name: nexus-monitor
    network_mode: host
    mem_limit: 50m
    mem_reservation: 25m
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  # -------------------------------------------------------------------
  # Nexus Guardian — Monitor de RAM y limpieza automática
  # -------------------------------------------------------------------
  guardian:
    image: nexus-guardian:v1
    container_name: nexus-guardian
    mem_limit: 50m
    mem_reservation: 25m
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - guardian-logs:/var/log
    restart: unless-stopped
    depends_on:
      - deepseek
      - gemini
      - antigravity
      - minimax
      - codex

  # -------------------------------------------------------------------
  # Commit Tracker DB — PostgreSQL lite
  # -------------------------------------------------------------------
  commits-db:
    image: postgres:15-alpine
    container_name: commits-db
    environment:
      POSTGRES_DB: commits
      POSTGRES_USER: commits
      POSTGRES_PASSWORD: commits_secret
    volumes:
      - commits-data:/var/lib/postgresql/data
    mem_limit: 50m
    mem_reservation: 25m
    restart: unless-stopped

  # -------------------------------------------------------------------
  # Commit Tracker API — GitHub commits cache
  # -------------------------------------------------------------------
  commit-tracker:
    image: nexus-commit-tracker:v1
    container_name: commit-tracker
    network_mode: host
    depends_on:
      - commits-db
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - DB_HOST=localhost
      - DB_NAME=commits
      - DB_USER=commits
      - DB_PASS=commits_secret
    mem_limit: 50m
    mem_reservation: 25m
    restart: unless-stopped

# =============================================================================
# Volumes
# =============================================================================
volumes:
  deepseek-config:
  ollama-models:
  gemini-config:
  antigravity-config:
  minimax-config:
  codex-config:
  guardian-logs:
  commits-data:
